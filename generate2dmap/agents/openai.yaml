interface:
  display_name: "Generate 2D Map"
  short_description: "Image-generated 2D scene maps, props, previews, collision, and scene-hook metadata."
  default_prompt: "Use $generate2dmap to create a playable image-generated 2D scene map; first choose map_mode from tile_mode, scene_mode, side_scroll_mode, grid_mode, room_chunk_mode, or baked_scene_mode based on the game genre and editability needs, then choose visual/runtime/collision/export axes; for side-view/platformer/parallax requests use side_scroll_mode, choose one stage_canvas first, defaulting to the project camera aspect or 1536x864 16:9 when unknown, and make sky, far_bg, mid_bg, near_bg, optional foreground_overlay, stage-reference, and stage-preview share that exact size/aspect/framing unless a layer is explicitly a repeatable strip; include scroll factors and separate platform/object/collision metadata; do not collapse side_scroll_mode into a single background image unless I explicitly ask for a flat/non-parallax background; for any playable/editable layered map, do not bake runtime-controlled props, interactables, hazards, doors, gates, pickups, actors, or foreground occluders into the base/background; classify every prop/object before generation, use square 2x2/3x3/4x4 prop packs only for compact props, and use one-by-one, non-actor 1x3/1x4 platform strips, custom wide cells, tile/object layers, or engine-native objects for floors, platforms, bridges, walls, ladders, gates, long hazards, wide/tall objects, and collision-aligned objects; include prompt files, scene hooks, collision, zones, a QA preview, and engine-ready metadata; do not stop at the reference mockup, draw annotated diagrams, generate actor sprites, or ship a single baked image as the runtime map unless I ask for a flat background."

policy:
  allow_implicit_invocation: true
