<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff;">

<section style="box-sizing: border-box; font-style: normal; font-weight: 400; font-size: 16px; color: #2b2b2b; margin-bottom: 0px; visibility: visible; max-width: 677px; margin-left: auto; margin-right: auto; background-color: #ffffff; padding: 40px 0;">

    <!-- 标题区 -->
    <section style="text-align: center; padding: 0 30px; margin-bottom: 30px; box-sizing: border-box; visibility: visible;">
        <p style="margin: 0 0 20px 0; padding: 0; color: {{PRIMARY_COLOR}}; font-size: 24px; font-weight: bold; line-height: 1.5; font-family: 'Microsoft YaHei', sans-serif; box-sizing: border-box; visibility: visible;">
            {{TITLE}}
        </p>
        <!-- 可选副标题 -->
        <!-- <p style="margin: 0; padding: 0; color: #2b2b2b; font-size: 16px; font-family: 'KaiTi', serif; box-sizing: border-box; visibility: visible;">{{SUBTITLE}}</p> -->
    </section>

    <!-- 分隔线 -->
    <section style="margin: 0 30px 30px 30px; height: 1px; background-color: #e5e5e5; box-sizing: border-box; visibility: visible;"></section>

    <!-- 正文内容区块 -->
    <!-- %CONTENT% -->

</section>

</body>
</html>
