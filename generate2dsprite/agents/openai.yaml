interface:
  display_name: "Generate 2D Sprite"
  short_description: "Pixel sprites, clean HD props, bundles, and transparent GIFs."
  default_prompt: "Use $generate2dsprite to create clean game sprites or map props that match the current map style; every raw sprite image must originate from built-in image_gen, not Three.js, Canvas, SVG, HTML/CSS drawing, PIL shape drawing, procedural geometry, placeholder primitives, or code-rendered screenshots; for characters, creatures, NPCs, enemies, summons, animated props, and hero actions, do not generate raw single-row sheets like 1x4/1x6/1x8, use centered multi-row grids instead: 4 frames -> 2x2, 6 frames -> 2x3, longer actions -> 2x4/3x3/3x4/4x4, then assemble engine strips or atlases only after QC; for controllable heroes and main characters, attack/shoot/cast body sheets must be body-only by default, preserving idle/run body scale and feet anchor, with slash arcs, weapon trails, muzzle flashes, projectiles, dust, and impacts generated as separate FX/projectile/impact sheets unless the runtime explicitly supports wider per-action cells and origins; use component_mode=largest for hero body grids and component_mode=all for separate FX/projectile/impact sheets; for map prop packs, classify assets first and use square 2x2/3x3/4x4 sheets only for compact props, while floors, platforms, bridges, walls, ladders, gates, doors, long hazards, wide/tall props, collision-aligned objects, and tileset/strip pieces must use one-by-one generation, platform strips, custom wide cells, or tileset-like atlases."
